<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>Bitcoin Western Rider</title>

  <link
    rel="stylesheet"
    href="style.css"
  >
</head>

<body>

  <main class="game">

    <!-- Bitcoin price display -->
    <div class="price-box">

      <span>
        Bitcoin Price
      </span>

      <strong id="bitcoinPrice">
        Loading...
      </strong>

      <div class="terrain-explanation">
        REAL LIVE BTC PRICES • FAST 45-SECOND RIDE
      </div>

      <div
  class="trail-status"
  id="trailStatus"
>
  <span class="trail-status-title">
    QUIET ON THE TRAIL
  </span>

  <span
    class="trail-status-detail"
    id="trailStatusDetail"
  >
    Waiting for market movement
  </span>
</div>
    </div>
<!-- Setting Western sun -->
<div
  class="western-sun"
  aria-hidden="true"
></div>

<!-- Distant circling vultures -->
<div
  class="vulture-layer"
  aria-hidden="true"
>
  <div class="vulture vulture-one">
    <span class="vulture-wing-left"></span>
    <span class="vulture-body"></span>
    <span class="vulture-wing-right"></span>
  </div>

  <div class="vulture vulture-two">
    <span class="vulture-wing-left"></span>
    <span class="vulture-body"></span>
    <span class="vulture-wing-right"></span>
  </div>
</div>
    <!-- Daily Bitcoin mountain range -->
<svg
  class="daily-mountains"
  id="dailyMountains"
  viewBox="0 0 1000 400"
  preserveAspectRatio="none"
  xmlns="http://www.w3.org/2000/svg"
  aria-hidden="true"
>
  <path
    class="daily-mountain-shape"
    d="
      M 0 310
      L 70 255
      L 135 285
      L 215 185
      L 285 245
      L 370 130
      L 455 220
      L 540 165
      L 625 260
      L 710 110
      L 790 205
      L 865 155
      L 930 235
      L 1000 190
      L 1000 400
      L 0 400
      Z
    "
  ></path>
</svg>

    <!-- Highest displayed daily Bitcoin peak -->
    <div
      class="daily-peak-label"
      id="dailyPeakLabel"
      aria-live="polite"
    >
      <span
  class="daily-peak-price"
  id="dailyPeakPrice"
></span>

<span
  class="daily-peak-date"
  id="dailyPeakDate"
></span>

<span class="daily-peak-pointer">
  ▲
</span>
    </div>

    <!-- Slowly moving distant desert hills -->
    <div
      class="distant-hills"
      aria-hidden="true"
    >

      <div class="distant-hills-track">

        <!-- First distant-hill section -->
        <div class="distant-hills-section">

          <div
            class="distant-hill distant-hill-one"
          ></div>

          <div
            class="distant-hill distant-hill-two"
          ></div>

          <div
            class="distant-hill distant-hill-three"
          ></div>

          <div
            class="distant-hill distant-hill-four"
          ></div>

        </div>


        <!-- Duplicate section for seamless looping -->
        <div class="distant-hills-section">

          <div
            class="distant-hill distant-hill-one"
          ></div>

          <div
            class="distant-hill distant-hill-two"
          ></div>

          <div
            class="distant-hill distant-hill-three"
          ></div>

          <div
            class="distant-hill distant-hill-four"
          ></div>

        </div>

      </div>

    </div>


    <!-- Medium-speed Western scenery -->
    <div
      class="western-scenery"
      aria-hidden="true"
    >

      <div class="western-scenery-track">

        <!-- First scenery section -->
        <div class="western-scenery-section">

          <div class="cactus cactus-one">

            <span
              class="cactus-arm cactus-arm-left"
            ></span>

            <span
              class="cactus-arm cactus-arm-right"
            ></span>

          </div>


          <div class="rock rock-one"></div>


          <div
            class="western-sign western-sign-one"
          >

            <div class="sign-board">
              BTC TRAIL
            </div>

            <div
              class="sign-post sign-post-left"
            ></div>

            <div
              class="sign-post sign-post-right"
            ></div>

          </div>


          <div class="rock rock-two"></div>


          <div class="cactus cactus-two">

            <span
              class="cactus-arm cactus-arm-left"
            ></span>

            <span
              class="cactus-arm cactus-arm-right"
            ></span>

          </div>


          <div class="rock rock-three"></div>

        </div>


        <!-- Duplicate scenery section -->
        <div class="western-scenery-section">

          <div class="cactus cactus-one">

            <span
              class="cactus-arm cactus-arm-left"
            ></span>

            <span
              class="cactus-arm cactus-arm-right"
            ></span>

          </div>


          <div class="rock rock-one"></div>


          <div
            class="western-sign western-sign-one"
          >

            <div class="sign-board">
              BEAR CANYON
            </div>

            <div
              class="sign-post sign-post-left"
            ></div>

            <div
              class="sign-post sign-post-right"
            ></div>

          </div>


          <div class="rock rock-two"></div>


          <div class="cactus cactus-two">

            <span
              class="cactus-arm cactus-arm-left"
            ></span>

            <span
              class="cactus-arm cactus-arm-right"
            ></span>

          </div>


          <div class="rock rock-three"></div>

        </div>

      </div>

    </div>

    <!-- Rolling tumbleweed -->
<div
  class="tumbleweed-layer"
  aria-hidden="true"
>
  <div class="tumbleweed"></div>
</div>


    <!-- Permanent Bitcoin network status -->
    <aside
      class="current-block-panel"
      id="currentBlockPanel"
      aria-live="polite"
      aria-atomic="true"
    >
      <span class="current-block-title">
        CURRENT BLOCK
      </span>

      <strong
        class="current-block-number"
        id="currentBlockNumber"
      >
        Connecting...
      </strong>

      <span
        class="current-block-age"
        id="currentBlockAge"
      >
        Checking Bitcoin network
      </span>
    </aside>

    <!-- Real Bitcoin block-mined surprise -->
    <div
      class="block-event-layer"
      id="blockEventLayer"
      aria-live="polite"
      aria-atomic="true"
    >
      <div
        class="block-impact-site"
        id="blockImpactSite"
      >
        <div
          class="block-shadow"
          aria-hidden="true"
        ></div>

        <div
          class="falling-bitcoin-block"
          id="fallingBitcoinBlock"
          aria-hidden="true"
        >
          <span class="falling-bitcoin-mark">₿</span>
        </div>

        <div
          class="block-impact-dust"
          aria-hidden="true"
        >
          <span></span>
          <span></span>
          <span></span>
        </div>

      </div>

      <div
        class="block-mined-message"
        id="blockMinedMessage"
      >
        <span class="block-mined-title">
          NEW BLOCK MINED
        </span>

        <strong
          class="block-mined-number"
          id="blockMinedNumber"
        ></strong>

        <span class="block-mined-detail">
          Added to the Bitcoin blockchain
        </span>
      </div>
    </div>

    <!-- Live Bitcoin price-generated hills -->
    <svg
      class="bitcoin-hills"
      id="bitcoinHills"
      viewBox="0 0 1000 400"
      preserveAspectRatio="none"
      xmlns="http://www.w3.org/2000/svg"
    >

      <path
        class="hill-shape"
        d="
          M 0 240

          C 60 220,
            120 180,
            190 230

          C 250 275,
            300 130,
            380 180

          C 450 225,
            510 165,
            580 245

          C 650 315,
            690 95,
            760 165

          C 820 225,
            880 135,
            1000 225

          L 1000 400

          L 0 400

          Z
        "
      >
      </path>

    </svg>


    <!-- Bitcoin cowboy mascot riding the live trail -->
    <div
      class="rider"
      id="rider"
    >
      <img
        class="bitcoin-cowboy-mascot"
        src="bitcoin_cowboy.png"
        alt="Bitcoin cowboy mascot"
      >
    </div>

  <!-- Creator X profile -->
  <a
    class="x-profile-link"
    href="https://x.com/J4YKL"
    target="_blank"
    rel="noopener noreferrer"
    aria-label="Visit J4YKL on X"
  >
      𝕏
  </a>

  </main>


  <script src="script.js"></script>

</body>

</html>
